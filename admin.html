<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एडमिन पैनल - अपना मार्केट</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin: 10px 0; font-size: 16px; }
        .btn-save { background: #25D366; }
        .btn-view { background: #3498db; }
        .p-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; text-align: left; }
        .p-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        #copyBox { display:none; background:#e8f5e9; padding:15px; border-radius:10px; border:1px dashed #25D366; margin-top:15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏪 दुकानदार एडमिन</h2>
    <p style="font-size:13px; color:gray;">अपनी दुकान की जानकारी भरें</p>
    
    <input type="text" id="shopId" placeholder="दुकान की ID (जैसे: ali7125)" onchange="loadShop()">
    <input type="number" id="shopWA" placeholder="WhatsApp नंबर (जैसे: 8797221991)">
    <textarea id="shopAddr" placeholder="दुकान का पूरा पता (Address)"></textarea>
    
    <div id="copyBox">
        <p style="margin:0; font-size:14px; color:#2e7d32;"><b>ग्राहक के लिए आपका लिंक:</b></p>
        <input type="text" id="customerUrl" readonly style="background:#fff; text-align:center;">
        <button class="btn" style="background:#075e54;" onclick="copyLink()">लिंक कॉपी करें</button>
    </div>

    <hr>
    <h3>📦 सामान जोड़ें</h3>
    <input type="text" id="pName" placeholder="सामान का नाम">
    <input type="number" id="pPrice" placeholder="कीमत (₹)">
    <input type="text" id="pLink" placeholder="फोटो का Direct Link">
    
    <button class="btn btn-save" onclick="saveData()">सामान सुरक्षित करें (Save)</button>
    <button class="btn btn-view" onclick="viewStore()">अपनी दुकान देखें</button>

    <div id="productList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ",
        projectId: "apna-market-61004"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function getCleanId() {
        return document.getElementById('shopId').value.trim().toLowerCase().replace(/\s+/g, '');
    }

    async function loadShop() {
        const id = getCleanId();
        if(!id) return;
        const doc = await db.collection("shops").doc(id).get();
        if(doc.exists) {
            const data = doc.data();
            document.getElementById('shopWA').value = data.whatsapp || "";
            document.getElementById('shopAddr').value = data.address || "";
            showLink(id);
            renderProducts(data.products || [], id);
        }
    }

    async function saveData() {
        const id = getCleanId();
        const wa = document.getElementById('shopWA').value;
        const addr = document.getElementById('shopAddr').value;
        const pName = document.getElementById('pName').value;
        const pPrice = document.getElementById('pPrice').value;
        const pLink = document.getElementById('pLink').value;

        if(!id || !wa || !pName || !pPrice || !pLink) return alert("कृपया सभी जानकारी भरें!");

        await db.collection("shops").doc(id).set({
            whatsapp: wa,
            address: addr,
            status: "active",
            products: firebase.firestore.FieldValue.arrayUnion({ name: pName, price: pPrice, img: pLink, pid: Date.now() })
        }, { merge: true });

        alert("सफलतापूर्वक सुरक्षित हुआ!");
        showLink(id);
        loadShop();
    }

    function showLink(id) {
        const url = `https://tamirali.github.io/Apna-Market-/index.html?id=${id}`;
        document.getElementById('customerUrl').value = url;
        document.getElementById('copyBox').style.display = 'block';
    }

    function copyLink() {
        const el = document.getElementById('customerUrl');
        el.select();
        document.execCommand('copy');
        alert("लिंक कॉपी हो गया!");
    }

    function renderProducts(items, shopId) {
        const list = document.getElementById('productList');
        let html = "<h4>आपके सामान:</h4>";
        items.forEach(p => {
            html += `<div class="p-item"><img src="${p.img}" class="p-img"><span>${p.name}<br>₹${p.price}</span><button onclick="deleteP('${shopId}', ${p.pid})" style="color:red; border:none; background:none; font-size:20px;">❌</button></div>`;
        });
        list.innerHTML = html;
    }

    async function deleteP(sid, pid) {
        if(confirm("डिलीट करें?")) {
            const doc = await db.collection("shops").doc(sid).get();
            const filtered = doc.data().products.filter(x => x.pid !== pid);
            await db.collection("shops").doc(sid).update({ products: filtered });
            loadShop();
        }
    }

    function viewStore() { window.location.href = `index.html?id=${getCleanId()}`; }
</script>
</body>
</html>
