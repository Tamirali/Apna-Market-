<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>दुकानदार एडमिन - अपना मार्केट</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; padding: 10px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin: 5px 0; }
        .btn-save { background: #25D366; font-size: 16px; }
        .btn-upload { background: #3498db; font-size: 13px; text-decoration: none; display: block; margin-top: 5px; }
        .agent-section { background: #e3f2fd; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #bbdefb; }
        #copyBox { display:none; background:#e8f5e9; padding:10px; border:1px dashed #25D366; margin-top:10px; border-radius:8px; }
        .p-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; text-align: left; }
        .p-img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .tip-text { font-size: 11px; color: #666; margin-top: -5px; margin-bottom: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #075e54; margin-bottom: 5px;">🏪 अपना मार्केट एडमिन</h2>
    
    <div class="agent-section">
        <p style="margin:0 0 5px 0; font-size:12px; font-weight:bold; color:#1565c0;">छात्र/एजेंट का विवरण (पेमेंट के लिए)</p>
        <input type="text" id="agentName" placeholder="आपका पूरा नाम">
        <input type="number" id="agentWA" placeholder="आपका व्हाट्सएप नंबर">
    </div>

    <input type="text" id="shopId" placeholder="दुकान की ID (जैसे: raju786)" onchange="loadShop()">
    <input type="number" id="shopWA" placeholder="दुकानदार का व्हाट्सएप नंबर">
    <textarea id="shopAddr" placeholder="दुकान का पूरा पता लिखें"></textarea>
    
    <div id="copyBox">
        <p style="margin:0; font-size:12px; color: #2e7d32;"><b>दुकान का लिंक तैयार है:</b></p>
        <input type="text" id="customerUrl" readonly style="text-align:center; font-size:11px;">
        <button class="btn" style="background:#075e54; font-size:12px;" onclick="copyLink()">लिंक कॉपी करें</button>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <h3>📦 सामान जोड़ें</h3>
    <input type="text" id="pName" placeholder="सामान का नाम (जैसे: चीनी 1kg)">
    <input type="number" id="pPrice" placeholder="कीमत (₹)">
    
    <div style="margin-bottom: 10px;">
        <input type="text" id="pLink" placeholder="यहाँ फोटो का 'Direct Link' पेस्ट करें">
        <div class="tip-text">फोटो का लिंक बनाने के लिए नीचे बटन दबाएं और <b>Direct Link</b> कॉपी करें:</div>
        <a href="https://postimages.org/" target="_blank" class="btn btn-upload">📸 फोटो अपलोड करें (PostImages)</a>
    </div>

    <button class="btn btn-save" onclick="saveData()">सुरक्षित करें और लाइव करें</button>
    
    <div id="productList" style="margin-top: 20px;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function getCleanId() { return document.getElementById('shopId').value.trim().toLowerCase().replace(/\s+/g, ''); }

    async function loadShop() {
        const id = getCleanId();
        if(!id) return;
        const doc = await db.collection("shops").doc(id).get();
        if(doc.exists) {
            const data = doc.data();
            document.getElementById('shopWA').value = data.whatsapp || "";
            document.getElementById('shopAddr').value = data.address || "";
            document.getElementById('agentName').value = data.agentName || "";
            document.getElementById('agentWA').value = data.agentWA || "";
            showLink(id);
            renderProducts(data.products || [], id);
        }
    }

    async function saveData() {
        const id = getCleanId();
        const wa = document.getElementById('shopWA').value;
        const addr = document.getElementById('shopAddr').value;
        const aName = document.getElementById('agentName').value;
        const aWA = document.getElementById('agentWA').value;
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pLink').value;

        if(!id || !wa || !name || !price || !img || !aName || !aWA) {
            alert("सभी जानकारी भरें (आपका नाम और फोटो लिंक ज़रूरी है)!");
            return;
        }

        await db.collection("shops").doc(id).set({
            whatsapp: wa, 
            address: addr, 
            agentName: aName,
            agentWA: aWA,
            status: "active",
            startDate: firebase.firestore.FieldValue.serverTimestamp(),
            products: firebase.firestore.FieldValue.arrayUnion({ name, price, img, pid: Date.now() })
        }, { merge: true });

        alert("सामान सुरक्षित हो गया!");
        showLink(id);
        loadShop();
        
        document.getElementById('pName').value = "";
        document.getElementById('pPrice').value = "";
        document.getElementById('pLink').value = "";
    }

    function showLink(id) {
        const url = `https://tamirali.github.io/Apna-Market-/index.html?id=${id}`;
        document.getElementById('customerUrl').value = url;
        document.getElementById('copyBox').style.display = 'block';
    }

    function copyLink() {
        const el = document.getElementById('customerUrl');
        el.select();
        document.execCommand('copy');
        alert("दुकान का लिंक कॉपी हो गया!");
    }

    function renderProducts(items, sid) {
        const list = document.getElementById('productList');
        let html = "<strong>सामान की लिस्ट:</strong>";
        items.forEach(p => {
            html += `<div class="p-item"><img src="${p.img}" class="p-img"><div style="flex-grow:1; margin-left:10px;"><b>${p.name}</b><br>₹${p.price}</div><button onclick="deleteP('${sid}', ${p.pid})" style="color:red; border:none; background:none; cursor:pointer; font-size:18px;">🗑️</button></div>`;
        });
        list.innerHTML = html;
    }

    async function deleteP(sid, pid) {
        if(confirm("डिलीट करें?")) {
            const doc = await db.collection("shops").doc(sid).get();
            const filtered = doc.data().products.filter(x => x.pid !== pid);
            await db.collection("shops").doc(sid).update({ products: filtered });
            loadShop();
        }
    }
</script>
</body>
</html>
