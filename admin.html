<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>महासंग्रह: अपना मार्केट एडमिन पोर्टल</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1 { color: #075e54; margin-top: 0; font-size: 24px; border-bottom: 2px solid #25D366; padding-bottom: 10px; }
        .section { margin-bottom: 25px; padding: 15px; background: #fafafa; border-radius: 8px; border-left: 4px solid #3498db; }
        .section h3 { margin-top: 0; color: #2c3e50; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; text-align: left; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1ebd59; }
        .shop-card { background: white; padding: 15px; margin-top: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .shop-info { text-align: left; }
        .shop-info h4 { margin: 0 0 5px 0; color: #075e54; }
        .shop-info p { margin: 2px 0; font-size: 13px; color: #666; }
        .actions { display: flex; gap: 8px; }
        .btn-del { background: #e74c3c; padding: 6px 12px; font-size: 12px; width: auto; }
        .btn-del:hover { background: #c0392b; }
        .btn-status { background: #f39c12; padding: 6px 12px; font-size: 12px; width: auto; }
        .btn-link { background: #3498db; padding: 6px 12px; font-size: 12px; width: auto; text-decoration: none; color: white; border-radius: 5px; font-weight: bold; display: inline-block; text-align: center; }
        .motto { font-size: 12px; color: #7f8c8d; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏪 अपना मार्केट - मुख्य एडमिन पोर्टल</h1>
    <p style="font-size: 14px; color: #666;">यहाँ से नई दुकानें बनाई जाती हैं और उन्हें नियंत्रित किया जाता है।</p>

    <!-- SECTION 1: CREATE NEW SHOP -->
    <div class="section">
        <h3>➕ नई दुकान बनाएँ</h3>
        
        <label>दुकान का नाम (Shop Name):</label>
        <input type="text" id="shopName" placeholder="उदा. अली जनरल स्टोर">

        <label>दुकानदार का नाम (Owner Name):</label>
        <input type="text" id="ownerName" placeholder="उदा. तामीर अली">

        <label>व्हाट्सएप नंबर (बिना +91 या 0 के):</label>
        <input type="number" id="whatsapp" placeholder="उदा. 9876543210">

        <label>दुकान का पूरा पता (Address):</label>
        <textarea id="address" rows="2" placeholder="दुकान का पता लिखें..."></textarea>

        <label>दुकान का यूनीक यूआरएल नाम (Slug - केवल छोटे अक्षर और हाइफन):</label>
        <input type="text" id="slug" placeholder="उदा. ali-store">

        <label>बैनर इमेज यूआरएल (Optional):</label>
        <input type="text" id="bannerUrl" placeholder="https://example.com/banner.jpg">

        <button onclick="createNewShop()">🚀 दुकान लाइव करें</button>
    </div>

    <!-- SECTION 2: MANAGED SHOPS LIST -->
    <div class="section">
        <h3>📋 सभी पंजीकृत दुकानें</h3>
        <div id="shopsList">डेटा लोड हो रहा है...</div>
    </div>

    <div class="motto">अक्ल की जीत - सत्य का घोषणापत्र - अपना मार्केट मिशन 786</div>
</div>

<!-- Firebase Frameworks -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    // Firebase Config
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // MASTER SECRET CODES
    const MASTER_SECRET_CODE_1 = "tamir@00769";
    const MASTER_SECRET_CODE_2 = "tamir@lI00769";

    // सुरक्षा जांच: दोनों में से कोई एक कोड होना अनिवार्य है
    function validateAdminAccess() {
        let code = prompt("🔑 एडमिन सुरक्षा जांच: अपना मास्टर सीक्रेट कोड दर्ज करें:");
        if (!code) {
            alert("एक्सेस अस्वीकार! कोड आवश्यक है।");
            document.body.innerHTML = "<h2 style='text-align:center; color:red; margin-top:50px;'>⚠️ अनधिकृत पहुंच (Unauthorized Access)</h2>";
            return false;
        }
        
        let trimmedCode = code.trim();
        if (trimmedCode === MASTER_SECRET_CODE_1 || trimmedCode === MASTER_SECRET_CODE_2) {
            return true;
        } else {
            alert("❌ गलत सीक्रेट कोड! आप इस पोर्टल को एक्सेस नहीं कर सकते।");
            document.body.innerHTML = "<h2 style='text-align:center; color:red; margin-top:50px;'>⚠️ गलत पासवर्ड सुरक्षा ब्लॉक</h2>";
            return false;
        }
    }

    // पेज लोड होते ही पहले पासवर्ड मांगना
    window.onload = function() {
        if (validateAdminAccess()) {
            loadAllShops();
        }
    };

    // 1. नई दुकान बनाने का फंक्शन
    async function createNewShop() {
        let shopName = document.getElementById('shopName').value.trim();
        let ownerName = document.getElementById('ownerName').value.trim();
        let whatsapp = document.getElementById('whatsapp').value.trim();
        let address = document.getElementById('address').value.trim();
        let slug = document.getElementById('slug').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
        let bannerUrl = document.getElementById('bannerUrl').value.trim();

        if (!shopName || !ownerName || !whatsapp || !slug) {
            alert("❌ कृपया सभी ज़रूरी फ़ील्ड्स (नाम, मालिक, व्हाट्सएप, और स्लग) भरें!");
            return;
        }

        try {
            // चेक करें कि इस स्लग से कोई और दुकान तो नहीं है
            let checkExist = await db.collection('shops').where('slug', '==', slug).get();
            if (!checkExist.empty) {
                alert("⚠️ यह स्लग (URL नाम) पहले से ही किसी और दुकान के लिए बुक है। कृपया दूसरा स्लग चुनें!");
                return;
            }

            // डेटाबेस में नई दुकान जोड़ना
            await db.collection('shops').add({
                shopName: shopName,
                ownerName: ownerName,
                whatsapp: whatsapp,
                address: address,
                slug: slug,
                bannerUrl: bannerUrl,
                isActive: true,
                products: [] // शुरुआत में खाली प्रोडक्ट्स लिस्ट
            });

            alert("🎉 " + shopName + " सफलतापूर्वक बन गई है!");
            clearForm();
            loadAllShops();

        } catch (e) {
            alert("त्रुटि: " + e.message);
        }
    }

    // 2. सभी दुकानों की लिस्ट लोड करना
    async function loadAllShops() {
        let listContainer = document.getElementById('shopsList');
        try {
            let snapshot = await db.collection('shops').get();
            if (snapshot.empty) {
                listContainer.innerHTML = "<p style='color:#999;'>अभी तक कोई दुकान नहीं बनाई गई है।</p>";
                return;
            }

            let html = "";
            snapshot.forEach(doc => {
                let data = doc.data();
                let id = doc.id;
                let statusText = data.isActive !== false ? "🟢 चालू (Active)" : "🔴 बंद (Inactive)";
                
                // आपकी गिटहब लाइव लिंक के आधार पर दुकान का रास्ता
                let liveShopUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '') + "index.html?shop=" + data.slug;

                html += `
                    <div class="shop-card">
                        <div class="shop-info">
                            <h4>${escapeHtml(data.shopName)} (${escapeHtml(data.slug)})</h4>
                            <p>👤 <b>मालिक:</b> ${escapeHtml(data.ownerName)} | 📞 ${escapeHtml(data.whatsapp)}</p>
                            <p>📊 <b>स्टेटस:</b> ${statusText} | 📦 <b>सामान संख्या:</b> ${data.products ? data.products.length : 0}</p>
                        </div>
                        <div class="actions">
                            <a href="${liveShopUrl}" target="_blank" class="btn-link">🔗 खोलें</a>
                            <button class="btn-status" onclick="toggleShopStatusFromAdmin('${id}', ${data.isActive !== false})">🔄 ऑन/ऑफ</button>
                            <button class="btn-del" onclick="deleteShopFromAdmin('${id}', '${escapeHtml(data.shopName)}')">🗑️ डिलीट</button>
                        </div>
                    </div>
                `;
            });
            listContainer.innerHTML = html;

        } catch (e) {
            listContainer.innerHTML = "डेटा लोड करने में त्रुटि: " + e.message;
        }
    }

    // 3. एडमिन पैनल से दुकान का स्टेटस बदलना
    async function toggleShopStatusFromAdmin(id, currentStatus) {
        if (!confirm("क्या आप इस दुकान का स्टेटस बदलना चाहते हैं?")) return;
        try {
            await db.collection('shops').doc(id).update({ isActive: !currentStatus });
            loadAllShops();
        } catch (e) { alert("त्रुटि: " + e.message); }
    }

    // 4. एडमिन पैनल से पूरी दुकान डिलीट करना
    async function deleteShopFromAdmin(id, name) {
        let psw = prompt(`⚠️ चेतावनी: आप '${name}' को पूरी तरह डिलीट करने जा रहे हैं!\nपुष्टि के लिए दोबारा मास्टर पासवर्ड दर्ज करें:`);
        if (psw && (psw.trim() === MASTER_SECRET_CODE_1 || psw.trim() === MASTER_SECRET_CODE_2)) {
            try {
                await db.collection('shops').doc(id).delete();
                alert("🗑️ दुकान को डेटाबेस से पूरी तरह हटा दिया गया है।");
                loadAllShops();
            } catch (e) { alert("त्रुटि: " + e.message); }
        } else {
            alert("गलत पासवर्ड! डिलीट करने की अनुमति नहीं दी गई।");
        }
    }

    function clearForm() {
        document.getElementById('shopName').value = '';
        document.getElementById('ownerName').value = '';
        document.getElementById('whatsapp').value = '';
        document.getElementById('address').value = '';
        document.getElementById('slug').value = '';
        document.getElementById('bannerUrl').value = '';
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
</script>
</body>
</html>
