<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>दुकानदार एडमिन - अपना मार्केट</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 10px; margin: 0; padding-bottom: 80px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 550px; margin: auto; }
        .alert { background: #ff4757; color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin: 5px 0; }
        .btn-create { background: #9C27B0; }
        .btn-copy { background: #075e54; }
        .btn-warning { background: #FF9800; }
        .link-box { background: #e8f5e9; padding: 15px; border-radius: 10px; margin: 15px 0; border: 2px solid #25D366; }
        .secret-code { background: #fff3cd; padding: 8px; border-radius: 8px; font-family: monospace; font-size: 18px; font-weight: bold; text-align: center; }
        .banner-preview { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; margin: 10px 0; border: 2px dashed #25D366; }
        .qr-section { background: #e3f2fd; padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; }
        .qr-box { background: white; padding: 15px; border-radius: 10px; display: inline-block; }
        .p-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 12px 0; gap: 10px; }
        .p-img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .success-msg { background: #25D366; color: white; padding: 8px; border-radius: 8px; margin: 10px 0; display: none; }
        .error-msg { background: #ff4757; color: white; padding: 8px; border-radius: 8px; margin: 10px 0; display: none; }
        .shop-info-section { display: none; }
        .fixed-buttons { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; z-index: 1000; }
        .fixed-btn { background: #075e54; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; border: none; }
        .fixed-btn.home { background: #3498db; }
    </style>
</head>
<body>

<div class="card">
    <div class="alert">⚠️ नई दुकान बनाने के लिए नीचे फॉर्म भरें</div>
    <h2 style="color:#075e54;">🏪 अपना मार्केट एडमिन</h2>
    
    <div id="successMsg" class="success-msg"></div>
    <div id="errorMsg" class="error-msg"></div>
    
    <!-- नई दुकान बनाने का सेक्शन -->
    <div style="background:#e3f2fd; padding:15px; border-radius:10px;">
        <h3>🌟 नई दुकान बनाएं</h3>
        <input type="text" id="shopName" placeholder="दुकान का नाम (जैसे: मेराज मॉल)">
        <input type="text" id="shopOwnerName" placeholder="दुकानदार का नाम">
        <input type="text" id="shopWhatsapp" placeholder="व्हाट्सएप नंबर">
        <textarea id="shopAddress" placeholder="पता"></textarea>
        <button class="btn btn-create" onclick="createNewShop()">🏪 नई दुकान बनाएं</button>
    </div>
    
    <hr>
    
    <!-- एडमिन लॉगिन सेक्शन -->
    <div style="background:#f9f9f9; padding:15px; border-radius:10px;">
        <h3>🔐 मौजूदा दुकान एडिट करें</h3>
        <input type="text" id="adminSecretCode" placeholder="अपना एडमिन सीक्रेट कोड डालें">
        <button class="btn" style="background:#075e54;" onclick="loginWithSecret()">🔓 लॉगिन करें</button>
    </div>
    
    <!-- दुकान पैनल -->
    <div id="shopPanel" class="shop-info-section">
        <div class="link-box">
            <h4>🔗 कस्टमर लिंक</h4>
            <div style="background:white; padding:10px; border-radius:8px; word-break:break-all;" id="customerLinkDisplay"></div>
            <button class="btn btn-copy" onclick="copyCustomerLink()">📋 कॉपी करें</button>
            <h4>🔒 एडमिन सीक्रेट कोड</h4>
            <div class="secret-code" id="secretCodeDisplay"></div>
            <button class="btn btn-copy" style="background:#FF9800;" onclick="copySecretCode()">🔑 कोड कॉपी करें</button>
        </div>
        
        <div style="background:#f9f9f9; padding:15px; border-radius:10px;">
            <h3>🎨 दुकान का बैनर</h3>
            <img id="bannerPreview" class="banner-preview" src="https://via.placeholder.com/500x140?text=No+Banner">
            <input type="text" id="bannerUrlInput" placeholder="बैनर फोटो का Direct Link">
            <button class="btn btn-warning" onclick="updateBanner()">🖼️ बैनर सेट करें</button>
        </div>
        
        <div class="qr-section">
            <h3>📱 QR कोड</h3>
            <div class="qr-box"><div id="qrcode"></div></div>
            <button class="btn" style="background:#3498db;" onclick="downloadQR()">💾 QR डाउनलोड करें</button>
        </div>
        
        <h3>✏️ दुकान की जानकारी</h3>
        <input type="text" id="editWhatsapp" placeholder="व्हाट्सएप नंबर">
        <textarea id="editAddress" placeholder="पता"></textarea>
        <button class="btn" style="background:#25D366;" onclick="updateShopInfo()">💾 सेव करें</button>
        
        <hr>
        <h3>➕ नया सामान जोड़ें</h3>
        <input type="text" id="pName" placeholder="सामान का नाम">
        <input type="number" id="pPrice" placeholder="कीमत (₹)">
        <input type="text" id="pLink" placeholder="फोटो का Direct Link">
        <button class="btn" style="background:#25D366;" onclick="addProduct()">➕ सामान जोड़ें</button>
        
        <div id="productList" style="margin-top:20px;"></div>
        
        <button class="btn" style="background:#e74c3c;" onclick="deleteShop()">🗑️ पूरी दुकान हटाएं</button>
    </div>
</div>

<div class="fixed-buttons">
    <button class="fixed-btn home" onclick="window.location.href='master.html'">🏠</button>
    <button class="fixed-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆️</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    auth.signInAnonymously().catch(e => console.log(e));

    let currentShop = null, currentId = null;

    function showMsg(msg, isErr) {
        let s = document.getElementById('successMsg'), e = document.getElementById('errorMsg');
        s.style.display = 'none'; e.style.display = 'none';
        if(isErr) { e.innerText = msg; e.style.display = 'block'; setTimeout(() => e.style.display = 'none', 3000); }
        else { s.innerText = msg; s.style.display = 'block'; setTimeout(() => s.style.display = 'none', 3000); }
    }

    function makeSlug(str) {
        return str.toLowerCase().replace(/[^a-z0-9\u0900-\u097F]/g, '-').replace(/-+/g, '-').substring(0, 50);
    }

    function generateCode() {
        let c = '', chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789';
        for(let i=0;i<10;i++) c += chars[Math.floor(Math.random() * chars.length)];
        return c;
    }

    async function createNewShop() {
        let name = document.getElementById('shopName').value.trim();
        let owner = document.getElementById('shopOwnerName').value.trim();
        let wa = document.getElementById('shopWhatsapp').value.trim();
        let addr = document.getElementById('shopAddress').value.trim();
        
        if(!name || !owner || !wa) { showMsg("सब भरो!", true); return; }
        
        let slug = makeSlug(name);
        let secret = generateCode();
        let shopId = 'shop_' + Date.now();
        
        // Check duplicate
        let exist = await db.collection('shops').where('slug', '==', slug).get();
        if(!exist.empty) { showMsg("यह नाम पहले है! दूसरा डालो।", true); return; }
        
        await db.collection('shops').doc(shopId).set({
            shopId: shopId, shopName: name, slug: slug, ownerName: owner,
            whatsapp: wa, address: addr, secretCode: secret,
            products: [], status: 'active', createdAt: new Date()
        });
        
        showMsg("✅ दुकान बन गई!");
        document.getElementById('shopName').value = '';
        document.getElementById('shopOwnerName').value = '';
        document.getElementById('shopWhatsapp').value = '';
        document.getElementById('shopAddress').value = '';
        
        await loadShop(secret);
    }

    async function loginWithSecret() {
        let code = document.getElementById('adminSecretCode').value.trim();
        if(!code) { showMsg("कोड डालो!", true); return; }
        await loadShop(code);
    }

    async function loadShop(secret) {
        let snap = await db.collection('shops').where('secretCode', '==', secret).get();
        if(snap.empty) { showMsg("गलत कोड!", true); return; }
        
        let doc = snap.docs[0];
        currentShop = doc.data();
        currentId = doc.id;
        
        document.getElementById('shopPanel').style.display = 'block';
        document.getElementById('editWhatsapp').value = currentShop.whatsapp || '';
        document.getElementById('editAddress').value = currentShop.address || '';
        
        let base = window.location.origin + window.location.pathname.replace('admin.html', '');
        document.getElementById('customerLinkDisplay').innerHTML = base + 'index.html?shop=' + currentShop.slug;
        document.getElementById('secretCodeDisplay').innerHTML = secret;
        
        if(currentShop.bannerUrl) document.getElementById('bannerPreview').src = currentShop.bannerUrl;
        
        renderProducts(currentShop.products || []);
        makeQR();
        showMsg("✅ लॉगिन ठीक!");
        document.getElementById('adminSecretCode').value = '';
    }

    function makeQR() {
        let url = window.location.origin + window.location.pathname.replace('admin.html', '') + 'index.html?shop=' + currentShop.slug;
        let div = document.getElementById('qrcode');
        div.innerHTML = '';
        new QRCode(div, { text: url, width: 160, height: 160, colorDark: "#075e54", colorLight: "#ffffff" });
    }

    function downloadQR() {
        let c = document.querySelector('#qrcode canvas');
        if(c) { let a = document.createElement('a'); a.download = currentShop.slug + '-qrcode.png'; a.href = c.toDataURL(); a.click(); showMsg("QR डाउनलोड!"); }
    }

    async function updateBanner() {
        let url = document.getElementById('bannerUrlInput').value.trim();
        if(!url) { showMsg("URL डालो!", true); return; }
        await db.collection('shops').doc(currentId).update({ bannerUrl: url });
        currentShop.bannerUrl = url;
        document.getElementById('bannerPreview').src = url;
        showMsg("बैनर सेट!");
    }

    async function updateShopInfo() {
        let wa = document.getElementById('editWhatsapp').value;
        let addr = document.getElementById('editAddress').value;
        await db.collection('shops').doc(currentId).update({ whatsapp: wa, address: addr });
        currentShop.whatsapp = wa; currentShop.address = addr;
        showMsg("सेव हो गया!");
    }

    async function addProduct() {
        let name = document.getElementById('pName').value.trim();
        let price = document.getElementById('pPrice').value;
        let img = document.getElementById('pLink').value.trim();
        if(!name || !price || !img) { showMsg("सब भरो!", true); return; }
        
        let newP = { id: Date.now().toString(), name: name, price: parseInt(price), img: img };
        let updated = [...(currentShop.products || []), newP];
        await db.collection('shops').doc(currentId).update({ products: updated });
        currentShop.products = updated;
        renderProducts(updated);
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pLink').value = '';
        showMsg("सामान जुड़ा!");
    }

    function renderProducts(prods) {
        let div = document.getElementById('productList');
        if(!prods.length) { div.innerHTML = '<p>कोई सामान नहीं</p>'; return; }
        let html = '';
        prods.forEach((p, i) => {
            html += `<div class="p-item"><img src="${p.img}" class="p-img" onerror="this.src='https://via.placeholder.com/55'"><div><b>${escapeHtml(p.name)}</b><br>₹${p.price}</div><div><button class="btn-warning" style="padding:5px 10px;margin:0 5px;" onclick="editProduct(${i})">✏️</button><button class="btn" style="background:#e74c3c;padding:5px 10px;margin:0;" onclick="deleteProduct(${i})">🗑️</button></div></div>`;
        });
        div.innerHTML = html;
    }

    function editProduct(i) {
        let p = currentShop.products[i];
        let n = prompt("नया नाम:", p.name); if(!n) return;
        let pr = prompt("नई कीमत:", p.price); if(!pr) return;
        let im = prompt("नया फोटो लिंक:", p.img); if(!im) return;
        let up = [...currentShop.products];
        up[i] = { ...up[i], name: n, price: parseInt(pr), img: im };
        saveProducts(up);
    }

    async function deleteProduct(i) {
        if(!confirm("हटाओ?")) return;
        let up = [...currentShop.products];
        up.splice(i,1);
        await saveProducts(up);
    }

    async function saveProducts(p) {
        await db.collection('shops').doc(currentId).update({ products: p });
        currentShop.products = p;
        renderProducts(p);
        showMsg("सेव!");
    }

    async function deleteShop() {
        let pass = prompt("मास्टर पासवर्ड:");
        if(pass !== "tamir@00769") { showMsg("गलत पासवर्ड!", true); return; }
        if(confirm("पक्का?")) { await db.collection('shops').doc(currentId).delete(); alert("दुकान हटी!"); location.reload(); }
    }

    function copyCustomerLink() { navigator.clipboard.writeText(document.getElementById('customerLinkDisplay').innerText); showMsg("लिंक कॉपी!"); }
    function copySecretCode() { navigator.clipboard.writeText(document.getElementById('secretCodeDisplay').innerText); showMsg("कोड कॉपी!"); }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
</script>
</body>
</html>
