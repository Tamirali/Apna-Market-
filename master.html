<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मास्टर कंट्रोल - अपना मार्केट</title>
    <style>
        body { font-family: sans-serif; background: #1a2a3a; color: white; padding: 15px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #25D366; padding-bottom: 10px; margin-bottom: 20px; }
        .shop-card { background: #2c3e50; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid #25D366; position: relative; }
        .date-badge { position: absolute; top: 10px; right: 10px; background: #e67e22; padding: 3px 8px; border-radius: 5px; font-size: 11px; }
        .payment-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .pay-btn { padding: 6px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; }
        .pending { background: #e74c3c; color: white; }
        .paid { background: #2ecc71; color: white; }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-status { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .info-link { color: #3498db; text-decoration: none; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-box">
        <div>
            <h2>🔑 मास्टर कंट्रोल</h2>
            <p style="margin:0; font-size:12px; color:#bdc3c7;">तामिर अली - डिजिटल मिशन</p>
        </div>
        <button onclick="exportData()" style="background:#f1c40f; padding:8px; border-radius:5px; border:none; font-weight:bold; cursor:pointer;">📋 डेटा रिपोर्ट</button>
    </div>

    <div id="masterList">लोड हो रहा है...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadMaster() {
        const snapshot = await db.collection("shops").get();
        const list = document.getElementById('masterList');
        list.innerHTML = "";

        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            
            // ऑटोमैटिक तारीख की गणना (Date Calculation)
            const startTimestamp = data.startDate;
            let displayDate = "तारीख उपलब्ध नहीं";
            let monthsPassed = 1;

            if(startTimestamp) {
                const startDate = startTimestamp.toDate();
                displayDate = startDate.toLocaleDateString('hi-IN');
                const today = new Date();
                const diffTime = Math.abs(today - startDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                monthsPassed = Math.floor(diffDays / 30) + 1; // हर 30 दिन पर एक नया महीना बटन
            }

            let paymentHTML = "";
            for(let i=1; i <= monthsPassed; i++) {
                const isPaid = data.payments && data.payments.includes(i);
                paymentHTML += `
                    <button class="pay-btn ${isPaid ? 'paid' : 'pending'}" 
                            onclick="togglePayment('${id}', ${i}, ${isPaid})">
                        माह ${i}: ${isPaid ? 'जमा' : 'बाकी'}
                    </button>`;
            }

            list.innerHTML += `
                <div class="shop-card">
                    <span class="date-badge">शुरू: ${displayDate}</span>
                    <b>दुकान ID: ${id}</b> <br>
                    <small>📍 ${data.address || 'पता दर्ज नहीं है'}</small> <br>
                    <a href="https://wa.me/91${data.whatsapp}" class="info-link">📞 व्हाट्सएप: ${data.whatsapp}</a>
                    
                    <div class="payment-row">${paymentHTML}</div>
                    
                    <div class="controls">
                        <button class="btn-status" style="background:#2ecc71;" onclick="updateStatus('${id}', 'active')">चालू</button>
                        <button class="btn-status" style="background:#f39c12;" onclick="updateStatus('${id}', 'inactive')">बंद</button>
                        <button class="btn-del" onclick="deleteShop('${id}')">🗑️ डिलीट</button>
                    </div>
                </div>`;
        });
    }

    async function togglePayment(shopId, monthNum, currentStatus) {
        const ref = db.collection("shops").doc(shopId);
        if(!currentStatus) {
            await ref.update({ payments: firebase.firestore.FieldValue.arrayUnion(monthNum) });
        } else {
            await ref.update({ payments: firebase.firestore.FieldValue.arrayRemove(monthNum) });
        }
        loadMaster();
    }

    async function updateStatus(id, s) {
        await db.collection("shops").doc(id).update({ status: s });
        loadMaster();
    }

    async function deleteShop(id) {
        const pass = prompt("डिलीट करने के लिए मास्टर पासवर्ड डालें:");
        if (pass === "tamir@lI00769") {
            if(confirm("सावधान! दुकान पूरी तरह हट जाएगी।?")) {
                await db.collection("shops").doc(id).delete();
                loadMaster();
            }
        }
    }

    async function exportData() {
        const snapshot = await db.collection("shops").get();
        let report = "--- अपना मार्केट रिकॉर्ड ---\n\n";
        snapshot.forEach(doc => {
            const d = doc.data();
            report += `दुकान: ${doc.id}\nफोन: ${d.whatsapp}\nपता: ${d.address}\n----------\n`;
        });
        alert(report);
    }

    loadMaster();
</script>
</body>
</html>
