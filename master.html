<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मास्टर डैशबोर्ड - अपना मार्केट</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 15px; margin: 0; }
        .header { background: #1e1e1e; padding: 20px; text-align: center; border-bottom: 3px solid #25D366; position: sticky; top: 0; z-index: 100; }
        
        /* एजेंट चार्ट स्टाइल */
        .agent-stats { background: #1e272e; padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px solid #3d4e5f; }
        .stat-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .stat-table th, .stat-table td { padding: 10px; border-bottom: 1px solid #34495e; text-align: left; }
        .stat-table th { background: #2c3e50; color: #25D366; }
        
        /* शॉप कार्ड स्टाइल */
        .shop-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .shop-card { background: #2c3e50; padding: 15px; border-radius: 12px; border-left: 5px solid #25D366; position: relative; }
        .bonus-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 5px; display: inline-block; }
        .bonus-ready { background: #2ecc71; color: white; }
        .bonus-waiting { background: #f1c40f; color: black; }
        
        .wa-btn { display: inline-block; background: #25D366; color: white; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 12px; margin-top: 5px; }
        .btn-pay { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; margin: 2px; }
        .paid { background: #2ecc71; color: white; }
        .unpaid { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">🔑 तामिर अली: मास्टर डैशबोर्ड</h2>
        <p style="font-size:12px; color:#bdc3c7; margin:5px 0 0 0;">डिजिटल मिशन - अक्ल की जीत</p>
    </div>

    <div class="agent-stats">
        <h3 style="margin:0; color:#25D366; font-size:16px;">📊 एजेंट रिपोर्ट कार्ड</h3>
        <table class="stat-table">
            <thead>
                <tr>
                    <th>एजेंट का नाम</th>
                    <th>कुल दुकानें</th>
                    <th>संपर्क</th>
                </tr>
            </thead>
            <tbody id="agentTableBody">
                </tbody>
        </table>
    </div>

    <h3 style="margin-left:5px; border-left: 4px solid #f1c40f; padding-left:10px;">🏪 सभी दुकानें</h3>
    <div id="shopList" class="shop-container">लोड हो रहा है...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadMasterData() {
        const snapshot = await db.collection("shops").get();
        const shopList = document.getElementById('shopList');
        const agentTable = document.getElementById('agentTableBody');
        
        shopList.innerHTML = "";
        agentTable.innerHTML = "";
        
        let agents = {}; // एजेंट्स का डेटा स्टोर करने के लिए

        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            const aName = data.agentName || "अज्ञात";
            const aWA = data.agentWA || "";

            // एजेंट चार्ट लॉजिक
            if (!agents[aName]) {
                agents[aName] = { count: 1, wa: aWA };
            } else {
                agents[aName].count += 1;
            }

            // बोनस और मंथली पेमेंट लॉजिक
            let monthsPassed = 1;
            let bonusStatus = '<span class="bonus-badge bonus-waiting">प्रगति: माह 1/6</span>';
            if(data.startDate) {
                const start = data.startDate.toDate();
                const diff = Math.ceil(Math.abs(new Date() - start) / (1000 * 60 * 60 * 24));
                monthsPassed = Math.floor(diff / 30) + 1;
                bonusStatus = monthsPassed >= 6 ? 
                    '<span class="bonus-badge bonus-ready">✅ ₹50 बोनस योग्य</span>' : 
                    `<span class="bonus-badge bonus-waiting">प्रगति: माह ${monthsPassed}/6</span>`;
            }

            let payButtons = "";
            for(let i=1; i <= monthsPassed; i++) {
                const isPaid = data.payments && data.payments.includes(i);
                payButtons += `<button class="btn-pay ${isPaid ? 'paid' : 'unpaid'}" onclick="togglePayment('${id}', ${i}, ${isPaid})">M${i}</button>`;
            }

            // शॉप कार्ड रेंडर
            shopList.innerHTML += `
                <div class="shop-card">
                    <b>🏪 ${id}</b> ${bonusStatus} <br>
                    <small>📍 ${data.address || 'नो एड्रेस'}</small>
                    <div style="background:rgba(0,0,0,0.2); padding:8px; border-radius:8px; margin-top:10px;">
                        <small style="color:#bdc3c7;">बनाने वाला छात्र:</small><br>
                        <b>👤 ${aName}</b> <br>
                        <a href="https://wa.me/91${aWA}" class="wa-btn">💬 WhatsApp</a>
                    </div>
                    <div style="margin-top:10px;">${payButtons}</div>
                </div>`;
        });

        // एजेंट टेबल रेंडर
        for (let name in agents) {
            agentTable.innerHTML += `
                <tr>
                    <td>${name}</td>
                    <td><b>${agents[name].count}</b></td>
                    <td><a href="https://wa.me/91${agents[name].wa}" style="color:#25D366; text-decoration:none;">संवाद करें</a></td>
                </tr>`;
        }
    }

    async function togglePayment(sid, month, status) {
        const ref = db.collection("shops").doc(sid);
        if(!status) await ref.update({ payments: firebase.firestore.FieldValue.arrayUnion(month) });
        else await ref.update({ payments: firebase.firestore.FieldValue.arrayRemove(month) });
        loadMasterData();
    }

    loadMasterData();
</script>
</body>
</html>
