<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मास्टर कंट्रोल - अपना मार्केट</title>
    <style>
        body { font-family: sans-serif; background: #1a2a3a; color: white; padding: 15px; }
        .header-box { border-bottom: 2px solid #25D366; padding-bottom: 10px; margin-bottom: 20px; }
        .shop-card { background: #2c3e50; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid #25D366; position: relative; }
        .agent-info { background: #1e272e; padding: 8px; border-radius: 8px; margin-top: 10px; border: 1px solid #3d4e5f; }
        .bonus-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 5px; }
        .bonus-waiting { background: #f1c40f; color: #000; }
        .bonus-ready { background: #2ecc71; color: #fff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .wa-link { color: #25D366; text-decoration: none; font-weight: bold; font-size: 13px; }
        .pay-btn { padding: 5px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 10px; margin: 2px; }
        .pending { background: #e74c3c; color: white; }
        .paid { background: #2ecc71; color: white; }
    </style>
</head>
<body>

    <div class="header-box">
        <h2>🔑 मास्टर पैनल (तामिर अली)</h2>
        <div id="usageMeter" style="font-size:12px; color:#bdc3c7;">लोड हो रहा है...</div>
    </div>

    <div id="masterList">डेटा लोड हो रहा है...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadMaster() {
        const snapshot = await db.collection("shops").get();
        const list = document.getElementById('masterList');
        list.innerHTML = "";
        
        document.getElementById('usageMeter').innerText = `कुल सक्रिय दुकानें: ${snapshot.size}`;

        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            
            // तारीख और बोनस लॉजिक
            let monthsPassed = 1;
            let bonusStatus = '<span class="bonus-badge bonus-waiting">प्रगति पर (Month 1)</span>';
            
            if(data.startDate) {
                const start = data.startDate.toDate();
                const diffDays = Math.ceil(Math.abs(new Date() - start) / (1000 * 60 * 60 * 24));
                monthsPassed = Math.floor(diffDays / 30) + 1;
                
                if(monthsPassed >= 6) {
                    bonusStatus = '<span class="bonus-badge bonus-ready">✅ ₹50 बोनस योग्य (6+ माह)</span>';
                } else {
                    bonusStatus = `<span class="bonus-badge bonus-waiting">प्रगति: माह ${monthsPassed}/6</span>`;
                }
            }

            // पेमेंट बटन
            let payHTML = "";
            for(let i=1; i <= monthsPassed; i++) {
                const isPaid = data.payments && data.payments.includes(i);
                payHTML += `<button class="pay-btn ${isPaid ? 'paid' : 'pending'}" onclick="togglePay('${id}', ${i}, ${isPaid})">M${i}</button>`;
            }

            list.innerHTML += `
                <div class="shop-card">
                    <b>🏪 दुकान: ${id}</b> ${bonusStatus} <br>
                    <small>📍 ${data.address || 'पता दर्ज नहीं'}</small> <br>
                    
                    <div class="agent-info">
                        <p style="margin:0; font-size:12px; color:#bdc3c7;">बनाने वाला (एजेंट):</p>
                        <b>👤 ${data.agentName || 'अज्ञात'}</b> <br>
                        <a href="https://wa.me/91${data.agentWA}" class="wa-link">💬 व्हाट्सएप: ${data.agentWA || 'N/A'}</a>
                    </div>

                    <div style="margin-top:10px;">${payHTML}</div>
                    <button onclick="deleteShop('${id}')" style="margin-top:10px; background:none; border:none; color:#ff4757; cursor:pointer; font-size:12px;">🗑️ डिलीट करें</button>
                </div>`;
        });
    }

    async function togglePay(sid, m, status) {
        const ref = db.collection("shops").doc(sid);
        if(!status) await ref.update({ payments: firebase.firestore.FieldValue.arrayUnion(m) });
        else await ref.update({ payments: firebase.firestore.FieldValue.arrayRemove(m) });
        loadMaster();
    }

    async function deleteShop(id) {
        if(confirm("डिलीट करें?")) {
            await db.collection("shops").doc(id).delete();
            loadMaster();
        }
    }

    loadMaster();
</script>
</body>
</html>
