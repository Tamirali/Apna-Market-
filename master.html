<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मास्टर पैनल - अपना मार्केट</title>
    <style>
        body { font-family: sans-serif; background: #1a2a3a; color: white; padding: 15px; }
        .header-box { border-bottom: 2px solid #25D366; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* अलर्ट मीटर स्टाइल */
        .usage-monitor { background: #2c3e50; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #34495e; }
        .meter-bar { background: #444; height: 10px; border-radius: 5px; margin-top: 8px; overflow: hidden; }
        .meter-fill { background: #2ecc71; height: 100%; width: 0%; transition: 0.5s; }
        .alert-text { color: #f1c40f; font-size: 13px; font-weight: bold; margin-top: 8px; display: none; }

        .shop-card { background: #2c3e50; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid #25D366; position: relative; }
        .date-badge { position: absolute; top: 10px; right: 10px; background: #e67e22; padding: 3px 8px; border-radius: 5px; font-size: 11px; }
        .pay-btn { padding: 6px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; margin: 2px; }
        .pending { background: #e74c3c; color: white; }
        .paid { background: #2ecc71; color: white; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-box">
        <h2>🔑 मास्टर कंट्रोल पैनल</h2>
        <p style="font-size:12px; color:#bdc3c7;">तामिर अली - डिजिटल मिशन</p>
    </div>

    <div class="usage-monitor">
        <strong>📊 फायरबेस (Firebase) उपयोग मीटर</strong>
        <div class="meter-bar"><div id="meterFill" class="meter-fill"></div></div>
        <p id="usageStatus" style="font-size:12px; margin-top:5px;">दुकानें लोड हो रही हैं...</p>
        <div id="limitAlert" class="alert-text">⚠️ चेतावनी: आप अपनी मुफ्त लिमिट के करीब हैं! अब पेड प्लान लेने का समय आ गया है।</div>
    </div>

    <div id="masterList">लोड हो रहा है...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadMaster() {
        const snapshot = await db.collection("shops").get();
        const list = document.getElementById('masterList');
        list.innerHTML = "";
        
        // लिमिट चेक करने का लॉजिक (फ्री प्लान में 1GB डेटा और 50K रीड्स मिलते हैं)
        const shopCount = snapshot.size;
        updateMeter(shopCount);

        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            const startTimestamp = data.startDate;
            let displayDate = "तारीख उपलब्ध नहीं";
            let monthsPassed = 1;

            if(startTimestamp) {
                const startDate = startTimestamp.toDate();
                displayDate = startDate.toLocaleDateString('hi-IN');
                const diffDays = Math.ceil(Math.abs(new Date() - startDate) / (1000 * 60 * 60 * 24));
                monthsPassed = Math.floor(diffDays / 30) + 1;
            }

            let paymentHTML = "";
            for(let i=1; i <= monthsPassed; i++) {
                const isPaid = data.payments && data.payments.includes(i);
                paymentHTML += `<button class="pay-btn ${isPaid ? 'paid' : 'pending'}" onclick="togglePayment('${id}', ${i}, ${isPaid})">M${i}: ${isPaid ? 'जमा' : 'बाकी'}</button>`;
            }

            list.innerHTML += `
                <div class="shop-card">
                    <span class="date-badge">शुरू: ${displayDate}</span>
                    <b>ID: ${id}</b> <br>
                    <small>📍 ${data.address || 'पता नहीं'}</small> <br>
                    <small>📞 ${data.whatsapp || 'नहीं'}</small>
                    <div style="margin-top:10px;">${paymentHTML}</div>
                    <div style="margin-top:10px;">
                        <button class="btn-del" onclick="deleteShop('${id}')">🗑️ डिलीट</button>
                    </div>
                </div>`;
        });
    }

    // मीटर अपडेट करने का फंक्शन
    function updateMeter(count) {
        const limit = 500; // हमने 500 दुकानों को एक सुरक्षित सीमा (Safe Limit) माना है
        const percent = Math.min((count / limit) * 100, 100);
        const fill = document.getElementById('meterFill');
        fill.style.width = percent + "%";
        
        document.getElementById('usageStatus').innerText = `कुल दुकानें: ${count} / ${limit} (सुरक्षित सीमा)`;

        // अगर 80% से ज्यादा हो जाए तो अलर्ट दिखाएं
        if(percent >= 80) {
            fill.style.background = "#e74c3c";
            document.getElementById('limitAlert').style.display = "block";
        } else if (percent >= 50) {
            fill.style.background = "#f1c40f";
        }
    }

    async function togglePayment(shopId, monthNum, currentStatus) {
        const ref = db.collection("shops").doc(shopId);
        if(!currentStatus) {
            await ref.update({ payments: firebase.firestore.FieldValue.arrayUnion(monthNum) });
        } else {
            await ref.update({ payments: firebase.firestore.FieldValue.arrayRemove(monthNum) });
        }
        loadMaster();
    }

    async function deleteShop(id) {
        const pass = prompt("पासवर्ड डालें:");
        if (pass === "tamir@lI00769") {
            await db.collection("shops").doc(id).delete();
            loadMaster();
        }
    }

    loadMaster();
</script>
</body>
</html>
