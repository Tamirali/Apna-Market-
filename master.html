<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मास्टर कंट्रोल - अपना मार्केट</title>
    <style>
        body { font-family: sans-serif; background: #1a2a3a; color: white; padding: 15px; }
        .shop-card { background: #2c3e50; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid #25D366; position: relative; }
        .payment-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .pay-btn { padding: 6px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; }
        .pending { background: #e74c3c; color: white; }
        .paid { background: #2ecc71; color: white; }
        .controls { margin-top: 15px; display: flex; gap: 10px; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-toggle { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .status-tag { font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
        .active-tag { background: #2ecc71; }
        .inactive-tag { background: #95a5a6; }
    </style>
</head>
<body>

    <h2>🔑 मास्टर कंट्रोल पैनल</h2>
    <p style="color: #bdc3c7;">अक्ल की जीत - दुकानों का प्रबंधन करें</p>
    <hr>
    <div id="masterList">दुकानें लोड हो रही हैं...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadMaster() {
        const snapshot = await db.collection("shops").get();
        const list = document.getElementById('masterList');
        list.innerHTML = "";

        if (snapshot.empty) {
            list.innerHTML = "<p>कोई दुकान नहीं मिली।</p>";
            return;
        }

        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            const start = data.startDate ? data.startDate.toDate() : new Date();
            const today = new Date();
            
            const diffTime = Math.abs(today - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const monthsPassed = Math.floor(diffDays / 30) + 1;

            let paymentHTML = "";
            for(let i=1; i <= monthsPassed; i++) {
                const isPaid = data.payments && data.payments.includes(i);
                paymentHTML += `
                    <button class="pay-btn ${isPaid ? 'paid' : 'pending'}" 
                            onclick="togglePayment('${id}', ${i}, ${isPaid})">
                        M${i}: ${isPaid ? 'PAID' : 'PEND'}
                    </button>`;
            }

            list.innerHTML += `
                <div class="shop-card">
                    <b>ID: ${id}</b> 
                    <span class="status-tag ${data.status === 'active' ? 'active-tag' : 'inactive-tag'}">${data.status}</span>
                    <br><small>WhatsApp: ${data.whatsapp || 'N/A'}</small>
                    <div class="payment-row">${paymentHTML}</div>
                    <div class="controls">
                        <button class="btn-toggle" style="background:#2ecc71; color:white;" onclick="updateStatus('${id}', 'active')">ON</button>
                        <button class="btn-toggle" style="background:#f39c12; color:white;" onclick="updateStatus('${id}', 'inactive')">OFF</button>
                        <button class="btn-del" onclick="deleteShop('${id}')">🗑️ दुकान डिलीट करें</button>
                    </div>
                </div>`;
        });
    }

    async function togglePayment(shopId, monthNum, currentStatus) {
        const ref = db.collection("shops").doc(shopId);
        if(!currentStatus) {
            await ref.update({ payments: firebase.firestore.FieldValue.arrayUnion(monthNum) });
        } else {
            await ref.update({ payments: firebase.firestore.FieldValue.arrayRemove(monthNum) });
        }
        loadMaster();
    }

    async function updateStatus(id, s) {
        await db.collection("shops").doc(id).update({ status: s });
        loadMaster();
    }

    // दुकान डिलीट करने का फंक्शन (पासवर्ड के साथ)
    async function deleteShop(id) {
        const pass = prompt("दुकान '" + id + "' डिलीट करने के लिए मास्टर पासवर्ड डालें:");
        if (pass === "tamir@lI00769") {
            if (confirm("क्या आप वाकई इस दुकान को हमेशा के लिए हटाना चाहते हैं?")) {
                await db.collection("shops").doc(id).delete();
                alert("दुकान सफलतापूर्वक हटा दी गई!");
                loadMaster();
            }
        } else if (pass !== null) {
            alert("गलत पासवर्ड! अक्ल का इस्तेमाल करें।");
        }
    }

    loadMaster();
</script>
</body>
</html>
