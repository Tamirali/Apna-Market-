<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>ओनर मास्टर - अपना मार्केट</title>
    <style>
        body { background: #2c3e50; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: white; color: #333; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
        .shop-row { border-bottom: 1px solid #eee; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        button { cursor: pointer; padding: 10px; border-radius: 8px; border: none; font-weight: bold; }
        .btn-on { background: #27ae60; color: white; }
        .btn-off { background: #c0392b; color: white; }
    </style>
</head>
<body>
    <div id="login" class="box">
        <h2>तामीर अली - लॉगिन</h2>
        <input type="password" id="pass" placeholder="Master Password" style="width:80%; padding:12px; margin-bottom:10px;">
        <button onclick="check()" style="background:#2c3e50; color:white; width:85%;">लॉगिन</button>
    </div>
    <div id="panel" class="box" style="display:none;">
        <h3>दुकान मैनेजमेंट</h3>
        <div id="list">लोड हो रहा है...</div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function check() {
        if(document.getElementById('pass').value === "tamir@00769") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            loadShops();
        } else { alert("गलत पासवर्ड!"); }
    }

    function loadShops() {
        db.collection("shops").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const data = doc.data();
                html += `<div class="shop-row"><span><b>${doc.id}</b></span>
                <button onclick="toggle('${doc.id}', '${data.status}')" class="${data.status === 'active' ? 'btn-off' : 'btn-on'}">
                    ${data.status === 'active' ? 'OFF' : 'ON'}
                </button></div>`;
            });
            document.getElementById('list').innerHTML = html || "कोई दुकान नहीं मिली।";
        });
    }

    async function toggle(id, s) {
        await db.collection("shops").doc(id).update({ status: s === 'active' ? 'inactive' : 'active' });
    }
</script>
</body>
</html>
