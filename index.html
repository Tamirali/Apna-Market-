<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अपना मार्केट - डिजिटल दुकान</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
        .shop-banner { width: 100%; height: 180px; object-fit: cover; background: #25D366; }
        .header { background: linear-gradient(135deg, #075e54, #128C7E); color: white; padding: 15px 20px; text-align: center; }
        .store-name { font-size: 1.8rem; }
        .info-bar { background: white; padding: 12px; margin: 12px; border-radius: 12px; border-left: 5px solid #25D366; }
        .section-title { padding: 0 12px; margin: 15px 0 10px; font-size: 1.3rem; color: #075e54; }
        .scroll-wrapper { overflow-x: auto; white-space: nowrap; padding: 8px 8px 20px; cursor: grab; }
        .scroll-wrapper::-webkit-scrollbar { height: 6px; }
        .scroll-wrapper::-webkit-scrollbar-thumb { background: #25D366; border-radius: 10px; }
        .product-row { display: inline-flex; gap: 16px; padding: 0 8px; }
        .product-card { width: 210px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); white-space: normal; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 170px; object-fit: cover; }
        .product-info { padding: 12px; }
        .product-name { font-weight: bold; margin-bottom: 5px; }
        .product-price { color: #e67e22; font-weight: bold; font-size: 16px; }
        .add-to-cart { background: #25D366; color: white; border: none; padding: 8px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .cart-section { position: sticky; bottom: 0; background: white; margin: 12px; padding: 12px 16px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); }
        .order-all-btn { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .cart-info { background: #25D366; color: white; padding: 5px 12px; border-radius: 25px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { max-width: 90%; max-height: 80%; border-radius: 10px; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e2a3a; color: white; padding: 10px 20px; border-radius: 30px; font-size: 12px; z-index: 200; }
    </style>
</head>
<body>

<img id="shopBanner" class="shop-banner" src="https://via.placeholder.com/800x180?text=Loading">
<div class="header">
    <h2 class="store-name" id="storeTitle">दुकान लोड हो रही है...</h2>
</div>

<div class="info-bar" id="shopDetails">
    📍 <b>पता:</b> <span id="addrDisp">...</span><br>
    📞 <b>दुकानदार व्हाट्सएप:</b> <span id="waDisp">...</span>
</div>

<div class="section-title">🛒 हमारे उत्पाद <span style="font-size:12px;">👈 स्क्रॉल करें 👉</span></div>
<div class="scroll-wrapper" id="scrollWrapper">
    <div class="product-row" id="productRow"></div>
</div>

<div class="cart-section" id="cartSection" style="display:none;">
    <div><span class="cart-info" id="cartCount">0</span> <span id="cartItemsList" style="font-size:12px;"></span></div>
    <button class="order-all-btn" onclick="orderMultiple()">🛍️ एक साथ ऑर्डर करें</button>
</div>

<div id="imageModal" class="modal" onclick="closeZoom()">
    <img class="modal-content" id="zoomedImg">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ", projectId: "apna-market-61004" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let cart = [];
    let currentShop = null;

    const urlParams = new URLSearchParams(window.location.search);
    const shopSlug = urlParams.get('shop');
    
    if(shopSlug) {
        loadShopBySlug(shopSlug);
    } else {
        document.body.innerHTML = '<h2 style="text-align:center; padding:50px;">❌ दुकान नहीं मिली। सही लिंक से आएं।</h2>';
    }

    async function loadShopBySlug(slug) {
        const snapshot = await db.collection('shops').where('slug', '==', slug).get();
        
        if(snapshot.empty) {
            document.body.innerHTML = '<h2 style="text-align:center; padding:50px;">❌ दुकान नहीं मिली। कृपया सही लिंक का उपयोग करें।</h2>';
            return;
        }
        
        currentShop = snapshot.docs[0].data();
        
        document.getElementById('storeTitle').innerText = currentShop.shopName || 'दुकान';
        document.getElementById('addrDisp').innerText = currentShop.address || 'उपलब्ध नहीं';
        document.getElementById('waDisp').innerText = currentShop.whatsapp || 'उपलब्ध नहीं';
        
        if(currentShop.bannerUrl) {
            document.getElementById('shopBanner').src = currentShop.bannerUrl;
        }
        
        renderProducts(currentShop.products || []);
    }

    function renderProducts(products) {
        const container = document.getElementById('productRow');
        if(!products.length) {
            container.innerHTML = '<div style="padding:40px;">कोई सामान उपलब्ध नहीं है।</div>';
            return;
        }
        
        let html = '';
        products.forEach(p => {
            html += `
                <div class="product-card">
                    <img src="${p.img}" class="product-img" onclick="openZoom('${p.img}')" onerror="this.src='https://via.placeholder.com/200'">
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(p.name)}</div>
                        <div class="product-price">₹ ${p.price}</div>
                        <button class="add-to-cart" onclick="addToCart(${p.id}, '${escapeHtml(p.name)}', ${p.price})">🛒 + ऑर्डर में जोड़ें</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function addToCart(id, name, price) {
        if(cart.find(item => item.id === id)) {
            showToast(`"${name}" पहले से कार्ट में है!`);
            return;
        }
        cart.push({ id, name, price });
        updateCartUI();
        showToast(`✅ "${name}" कार्ट में जोड़ा गया`);
    }

    function updateCartUI() {
        const cartSection = document.getElementById('cartSection');
        if(cart.length > 0) {
            cartSection.style.display = 'flex';
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('cartItemsList').innerHTML = cart.map(item => item.name).join(', ').substring(0, 40);
        } else {
            cartSection.style.display = 'none';
        }
    }

    function orderMultiple() {
        if(cart.length === 0) return;
        
        let msg = "नमस्ते, मैं ये सामान खरीदना चाहता/चाहती हूँ:\n\n";
        let total = 0;
        cart.forEach((item, i) => {
            msg += `${i+1}. ${item.name} - ₹${item.price}\n`;
            total += item.price;
        });
        msg += `\nकुल: ₹${total}\nकृपया ऑर्डर कन्फर्म करें।`;
        
        const waLink = `https://wa.me/91${currentShop.whatsapp}?text=${encodeURIComponent(msg)}`;
        cart = [];
        updateCartUI();
        window.open(waLink, '_blank');
        showToast("📦 ऑर्डर भेजा जा रहा है!");
    }

    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if(!toast) {
            toast = document.createElement('div');
            toast.className = 'toast';
            document.body.appendChild(toast);
        }
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    function openZoom(src) {
        document.getElementById('imageModal').style.display = 'flex';
        document.getElementById('zoomedImg').src = src;
    }
    function closeZoom() {
        document.getElementById('imageModal').style.display = 'none';
    }
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
</script>
</body>
</html>
