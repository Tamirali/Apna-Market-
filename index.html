<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अपना मार्केट - ग्राहक पोर्टल</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 10px; }
        .header { background: #25D366; color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .info-bar { background: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; border-left: 5px solid #3498db; }
        .product-card { background: white; border-radius: 12px; margin-bottom: 15px; padding: 12px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        .order-btn { background: #25D366; color: white; border: none; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-left: auto; }
        .address-text { color: #555; font-style: italic; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div id="shopView">
    <div class="header">
        <h2 id="storeTitle">दुकान लोड हो रही है...</h2>
        <p>तामीर अली: अक्ल की जीत</p>
    </div>

    <div class="info-bar" id="shopDetails">
        <b>📍 पता:</b> <span id="addrDisp">लोड हो रहा है...</span><br>
        <b>📞 WhatsApp:</b> <span id="waDisp">...</span>
    </div>

    <div id="productList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBfYd6Cbt6bDmK7Rmh_3RivoHTRl-5AweQ",
        projectId: "apna-market-61004"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const shopId = new URLSearchParams(window.location.search).get('id');

    if(shopId) { loadStore(shopId.toLowerCase()); }

    async function loadStore(id) {
        const doc = await db.collection("shops").doc(id).get();
        if(doc.exists) {
            const data = doc.data();
            if(data.status === "inactive") { document.body.innerHTML="<h2 style='text-align:center; padding:50px;'>⚠️ यह दुकान अभी बंद है।</h2>"; return; }
            
            document.getElementById('storeTitle').innerText = id.toUpperCase();
            document.getElementById('addrDisp').innerText = data.address || "उपलब्ध नहीं";
            document.getElementById('waDisp').innerText = data.whatsapp || "उपलब्ध नहीं";
            
            renderProducts(data.products || [], data.whatsapp);
        } else {
            document.body.innerHTML="<h2 style='text-align:center; padding:50px;'>❌ दुकान नहीं मिली!</h2>";
        }
    }

    function renderProducts(items, phone) {
        const list = document.getElementById('productList');
        let html = "";
        items.forEach(p => {
            const msg = window.encodeURIComponent(`नमस्ते, मुझे आपकी दुकान से '${p.name}' खरीदना है। कीमत: ₹${p.price}`);
            const waLink = `https://wa.me/91${phone}?text=${msg}`;
            html += `
                <div class="product-card">
                    <img src="${p.img}" class="product-img">
                    <div>
                        <b>${p.name}</b><br>
                        <span style="color:#27ae60; font-weight:bold;">₹${p.price}</span>
                    </div>
                    <a href="${waLink}" class="order-btn">Order</a>
                </div>`;
        });
        list.innerHTML = html || "<p style='text-align:center;'>कोई सामान उपलब्ध नहीं है।</p>";
    }
</script>
</body>
</html>
